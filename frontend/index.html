<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Auditor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <i class="fa-solid fa-shield-halved"></i>
                <h1>Compliance Auditor</h1>
            </div>
        </header>

        <main class="chat-container">
            <div id="chat-box" class="chat-box">
                <!-- Messages will appear here -->
                <div class="welcome-message">
                    <div class="welcome-icon"><i class="fa-solid fa-robot"></i></div>
                    <h2>How can I help you with compliance today?</h2>
                    <p>Ask any question related to enterprise security, controls, and safeguards.</p>
                </div>
            </div>
        </main>

        <div class="input-container">
            <div class="input-wrapper">
                <input
                    id="question"
                    type="text"
                    placeholder="Ask a compliance question..."
                    autocomplete="off"
                >
                <button id="send-btn" onclick="sendQuestion()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
